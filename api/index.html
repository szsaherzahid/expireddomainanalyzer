<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expired Domain Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .loading-bar {
      animation: move 1.2s linear infinite;
      width: 40%;
    }

    @keyframes move {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(250%); }
    }
  </style>
</head>

<body class="bg-[#0b0f19] text-white">

<!-- HEADER -->
<header class="text-center py-10">
  <h1 class="text-4xl font-bold">Expired Domain Analyzer</h1>
  <p class="text-gray-400 mt-2">Check domain age, backlinks & SEO metrics</p>
</header>

<!-- TOOL -->
<div class="max-w-3xl mx-auto bg-white/5 border border-white/10 p-6 rounded-2xl">

  <input id="domain"
    class="w-full p-3 rounded-lg bg-black/40 border border-white/10"
    placeholder="Enter domain (example.com)">

  <button onclick="analyze()"
    class="w-full mt-3 bg-indigo-600 hover:bg-indigo-700 py-3 rounded-lg font-semibold">
    Analyze Domain
  </button>

  <!-- LOADER -->
  <div id="loader" class="hidden mt-4">
    <div class="w-full bg-gray-700 h-2 rounded-full overflow-hidden">
      <div class="h-2 bg-indigo-500 loading-bar"></div>
    </div>
    <p class="text-center text-sm text-gray-400 mt-2">Analyzing domain...</p>
  </div>

  <!-- RESULT -->
  <div id="result" class="mt-6"></div>

</div>

<script>
async function analyze() {
  const domain = document.getElementById("domain").value.trim();

  const loader = document.getElementById("loader");
  const result = document.getElementById("result");

  if (!domain) {
    result.innerHTML = `<p class="text-red-400">Please enter a domain</p>`;
    return;
  }

  loader.classList.remove("hidden");
  result.innerHTML = "";

  try {
    const res = await fetch(`/api/analyze?domain=${domain}`);
    const data = await res.json();

    loader.classList.add("hidden");

    if (data.error) {
      result.innerHTML = `<p class="text-red-400">${data.error}</p>`;
      return;
    }

    const radius = 50;
    const circumference = 2 * Math.PI * radius;

    result.innerHTML = `
      <div class="grid grid-cols-2 gap-4 mt-6">

        <!-- AGE -->
        <div class="bg-white/5 p-4 rounded-xl border border-white/10">
          <p class="text-gray-400 text-sm">Age</p>
          <p class="font-bold">${data.age || "N/A"}</p>
        </div>

        <!-- FIRST CREATED -->
        <div class="bg-white/5 p-4 rounded-xl border border-white/10">
          <p class="text-gray-400 text-sm">First Created</p>
          <p class="font-bold">${data.firstCreated || "N/A"}</p>
        </div>

        <!-- BACKLINKS -->
        <div class="bg-white/5 p-4 rounded-xl border border-white/10">
          <p class="text-gray-400 text-sm">Backlinks</p>
          <p class="font-bold">${data.backlinks || 0}</p>
        </div>

        <!-- STATUS -->
        <div class="bg-white/5 p-4 rounded-xl border border-white/10">
          <p class="text-gray-400 text-sm">Status</p>
          <p class="font-bold">${data.status || "Unknown"}</p>
        </div>

        <!-- DA -->
        <div class="bg-white/5 p-4 rounded-xl border border-white/10">
          <p class="text-gray-400 text-sm">DA</p>
          <p class="font-bold">${data.DA ?? "N/A"}</p>
        </div>

        <!-- DR -->
        <div class="bg-white/5 p-4 rounded-xl border border-white/10">
          <p class="text-gray-400 text-sm">DR</p>
          <p class="font-bold">${data.DR ?? "N/A"}</p>
        </div>

        <!-- REGISTRAR -->
        <div class="bg-white/5 p-4 rounded-xl border border-white/10 col-span-2">
          <p class="text-gray-400 text-sm">Registrar</p>
          <p class="font-bold">${data.registrar || "N/A"}</p>
        </div>

        <!-- LAST HOSTING -->
        <div class="bg-white/5 p-4 rounded-xl border border-white/10 col-span-2">
          <p class="text-gray-400 text-sm">Last Hosting Date</p>
          <p class="font-bold">${data.lastHostingDate || "N/A"}</p>
        </div>

        <!-- SPAM SCORE -->
        <div class="col-span-2 bg-white/5 p-6 rounded-xl border border-white/10 text-center">

          <p class="text-gray-400 mb-3">Spam Score</p>

          <div class="relative w-28 h-28 mx-auto">

            <svg class="w-28 h-28 transform -rotate-90">
              <circle cx="56" cy="56" r="50"
                stroke="#2d2d2d" stroke-width="10" fill="none"/>

              <circle cx="56" cy="56" r="50"
                stroke="red"
                stroke-width="10"
                fill="none"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="${circumference - (circumference * data.spamScore) / 100}"
                stroke-linecap="round"/>
            </svg>

            <div class="absolute inset-0 flex items-center justify-center">
              <p class="text-xl font-bold">${data.spamScore || 0}</p>
            </div>

          </div>

        </div>

      </div>
    `;

  } catch (err) {
    loader.classList.add("hidden");
    result.innerHTML = `<p class="text-red-400">Failed to fetch data</p>`;
  }
}
</script>

</body>
</html>
